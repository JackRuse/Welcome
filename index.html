<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaii Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">

        <div class="hearts">♡ ♡ ♡</div>

        <img src="profile.jpg" alt="Profile" class="profile">

        <h1>Login</h1>

        <!-- 🌸 GUIDE -->
        <div class="guide">
            Username: <b>cute</b> <br>
            Password: <b>cute</b>
        </div>

        <form id="loginForm">

            <input type="text" id="username" placeholder="Username" required>

            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">LOGIN</button>

        </form>

    </div>

    <!-- 🌸 SUCCESS MODAL -->
    <div id="welcomeModal" class="modal">
        <div class="modal-box success">

            <div class="sparkles">✨ 💖 ✨</div>

            <img src="welcome.gif" alt="Welcome Image" class="modal-image">

            <h2>Welcome to the person who french kissed her classmate at a young age!</h2>
            <p>You successfully logged in 🌸</p>

            <button id="closeWelcome">OK</button>
        </div>
    </div>

    <!-- ❌ ERROR MODAL -->
    <div id="errorModal" class="modal">
        <div class="modal-box error">

            <div class="sparkles">💔 😢 💔</div>

            <h2>Oops!</h2>
            <p>Wrong username or password ❌</p>

            <button id="closeError">Try Again</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
